name: Notify QA on push

on:
  push:
    branches:
      - main

jobs:
  trigger-qa:
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch to QA repo
        run: |
          curl -s -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.QA_REPO_PAT }}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/Dendypratama17/PrivySign/dispatches \
            -d "{\"event_type\":\"run-api-test-stg\",\"client_payload\":{\"branch\":\"${{ github.ref }}\",\"commit\":\"${{ github.sha }}\",\"triggered_by\":\"${{ github.actor }}\"}}"
